# ===============================
# CONFIGURACIï¿½N DE BASE DE DATOS (MySQL)
# ===============================
spring.datasource.url=jdbc:mysql://localhost:3306/testimonial_cms_db
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ===============================
# CONFIGURACIï¿½N DE HIBERNATE / JPA
# ===============================
# 'update' actualiza el esquema de la base de datos automï¿½ticamente al arrancar
spring.jpa.hibernate.ddl-auto=update

# Muestra las consultas SQL en la consola (sï¿½per ï¿½til para debuggear)
spring.jpa.show-sql=true

# Da un formato mï¿½s legible a las consultas SQL en la consola
spring.jpa.properties.hibernate.format_sql=true

# Especifica el dialecto de MySQL para que Hibernate sepa cï¿½mo armar las consultas
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
server.port=8081